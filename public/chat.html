<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connect — Chat Room</title>

<link rel="icon" href="./img/favicon.png">
<link rel="stylesheet" href="./css/styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>


<body>

<div class="chat-app">

    <!-- SIDEBAR -->

    <aside id="sidebar" class="chat-sidebar">
        <!-- populated dynamically -->
    </aside>


    <!-- MAIN CHAT -->

    <main class="chat-main">

        <!-- HEADER -->

        <header class="chat-header">

            <div class="room-info">

                <h2 id="room-name">Chat Room</h2>

                <div class="connection-status">
                    <span class="status-indicator online"></span>
                    <span class="status-text">Connected</span>
                </div>

            </div>

            <button class="exit-btn" onclick="location.href='/'">
                <i class="fas fa-sign-out-alt"></i>
                Leave
            </button>

        </header>



        <!-- MESSAGES AREA -->

        <section id="messages" class="chat-messages">

            <div class="welcome-card">

                <i class="fas fa-comments"></i>

                <h3>Welcome to Connect</h3>

                <p>Start chatting with people in your room.</p>

            </div>

        </section>



        <!-- MESSAGE INPUT -->

        <footer class="chat-compose">

            <form id="message-form">

                <div class="compose-box">

                    <input
                    type="text"
                    name="message"
                    placeholder="Write a message..."
                    autocomplete="off"
                    required>

                    <button id="send-btn" type="submit">

                        <i class="fas fa-paper-plane"></i>

                    </button>

                </div>

            </form>

        </footer>

    </main>

</div>



<!-- MESSAGE TEMPLATE -->

<script id="message-template" type="text/html">

<div class="message {{#isOwn}}own-message{{/isOwn}}">

    <div class="message-header">

        <span class="message-user">
            {{username}}
        </span>

        <span class="message-time">
            {{createdAt}}
        </span>

    </div>

    <div class="message-body">

        <p>{{message}}</p>

    </div>

</div>

</script>



<!-- SIDEBAR TEMPLATE -->

<script id="sidebar-template" type="text/html">

<div class="sidebar-top">

    <h2 class="room-title">
        <i class="fas fa-door-open"></i>
        {{room}}
    </h2>

</div>


<div class="sidebar-users">

<h3>
<i class="fas fa-users"></i>
Users ({{users.length}})
</h3>

<ul>

{{#users}}

<li class="user">

<span class="online-dot"></span>

<span class="username">
{{username}}
</span>

{{#isCurrentUser}}
<span class="you-badge">You</span>
{{/isCurrentUser}}

</li>

{{/users}}

</ul>

</div>

</script>



<!-- LIBRARIES -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/3.0.1/mustache.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.22.2/moment.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qs/6.6.0/qs.min.js"></script>

<script src="/socket.io/socket.io.js"></script>

<script src="./js/chat.js"></script>


</body>

</html>
